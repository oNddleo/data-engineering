name: dedup-with-bloom CI

on:
  push:
    paths:
      - "dedup-with-bloom/**"
      - ".github/workflows/bloomdedup.yml"
  pull_request:
    paths:
      - "dedup-with-bloom/**"

defaults:
  run:
    working-directory: dedup-with-bloom

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .[dev]
      - run: ruff check src tests
      - run: ruff format --check src tests
      - run: mypy --strict src
      - run: pytest -q
