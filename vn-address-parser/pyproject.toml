[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vn-address-parser"
version = "0.1.0"
description = "Parse Vietnamese postal addresses into structured 3-level admin hierarchy (Tỉnh/Thành phố → Quận/Huyện → Phường/Xã) with diacritic-folding, abbreviation expansion, and fuzzy matching."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "sophie-nguyenthuthuy" }]
keywords = ["vietnam", "address", "postal", "geocoding", "parser", "fuzzy-match"]
classifiers = ["Development Status :: 4 - Beta"]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "hypothesis>=6.100", "mypy>=1.10", "ruff>=0.5"]

[project.scripts]
vnaddr = "vnaddr.cli:main"

[project.urls]
Homepage = "https://github.com/sophie-nguyenthuthuy/data-engineering/tree/main/vn-address-parser"

[tool.hatch.build.targets.wheel]
packages = ["src/vnaddr"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "SIM", "RUF", "TCH"]
ignore = ["E501", "B008", "RUF001", "RUF002", "RUF003"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B", "SIM", "TCH"]
"src/vnaddr/__init__.py" = ["TCH004"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-ra --strict-markers"
markers = ["slow: marks tests as slow", "property: hypothesis property tests"]
