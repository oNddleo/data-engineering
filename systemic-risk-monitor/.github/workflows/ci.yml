name: CI

on:
  push:
    branches: ["**"]
    paths:
      - "systemic-risk-monitor/**"
  pull_request:
    paths:
      - "systemic-risk-monitor/**"

defaults:
  run:
    working-directory: systemic-risk-monitor

jobs:
  lint-and-test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e . ruff mypy hypothesis pytest

      - name: Ruff lint
        run: python -m ruff check src/riskmonitor/ tests/

      - name: Ruff format check
        run: python -m ruff format --check src/riskmonitor/ tests/

      - name: Mypy type check
        run: python -m mypy --strict --package riskmonitor

      - name: Pytest
        run: python -m pytest tests/ -v --tb=short
