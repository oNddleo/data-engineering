[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "retention-policy-engine"
version = "0.1.0"
description = "Data retention policy engine: TTL, count, size-based rules with eviction"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = []

[project.scripts]
retention = "retention.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/retention"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
strict = true
python_version = "3.10"

[tool.ruff]
src = ["src"]
line-length = 99

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "SIM", "RUF", "TCH"]
ignore = ["RUF002", "RUF003"]
