# Trino Iceberg connector -> Lakekeeper REST catalog -> MinIO (S3).
#
# Uses the NATIVE S3 file system (Trino ~440+). If you pin an OLDER Trino that
# lacks fs.native-s3, switch to that version's legacy `hive.s3.*`/`fs.s3.*` props
# instead — do NOT mix the two generations (a top failure mode).

connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://lakekeeper:8181/catalog
# Warehouse identifier as registered in Lakekeeper (infra/lakekeeper/bootstrap.sh),
# NOT the literal string "s3://warehouse".
iceberg.rest-catalog.warehouse=warehouse
iceberg.rest-catalog.security=NONE

# --- Native S3 filesystem pointed at MinIO ---
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
# MANDATORY for MinIO: it serves path-style (http://minio:9000/bucket/key),
# not virtual-hosted (http://bucket.minio:9000/key) which Docker DNS can't resolve.
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
