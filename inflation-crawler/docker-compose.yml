services:
  api:
    build: .
    image: inflation-crawler:latest
    ports: ["8000:8000"]
    volumes:
      - ./data:/data
    environment:
      - IC_DATA_DIR=/data
      - IC_DB_PATH=/data/inflation.duckdb
      - IC_BLS_API_KEY=${IC_BLS_API_KEY:-}
      - IC_OLLAMA_ENABLED=${IC_OLLAMA_ENABLED:-false}
      - IC_OLLAMA_HOST=${IC_OLLAMA_HOST:-http://host.docker.internal:11434}
      - IC_OLLAMA_MODEL=${IC_OLLAMA_MODEL:-llama3.2:3b}

  demo:
    image: inflation-crawler:latest
    depends_on: [api]
    volumes:
      - ./data:/data
    environment:
      - IC_DATA_DIR=/data
      - IC_DB_PATH=/data/inflation.duckdb
    command: ["bash", "scripts/run_demo.sh"]
    profiles: ["demo"]
