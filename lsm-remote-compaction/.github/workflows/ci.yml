name: CI

on:
  push:
    paths:
      - "lsm-remote-compaction/**"
  pull_request:
    paths:
      - "lsm-remote-compaction/**"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lsm-remote-compaction

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]" ruff mypy hypothesis pytest

      - name: Ruff lint
        run: python -m ruff check src/lsmcompact/ tests/

      - name: Ruff format check
        run: python -m ruff format --check src/lsmcompact/ tests/

      - name: Mypy type check
        run: python -m mypy --strict --package lsmcompact

      - name: Pytest
        run: python -m pytest tests/ -q --tb=short
