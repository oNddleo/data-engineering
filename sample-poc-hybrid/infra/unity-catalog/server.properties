# =====================================================================
# Unity Catalog OSS 0.3 server config
# Backed by Postgres (postgres-meta), serves on :8087
# Storage: S3a (MinIO) for table data
# =====================================================================

server.port=8087
server.env=DEV

# --- Storage (catalog metadata) — Postgres ---------------------------
# Switch from default H2 to Postgres so metadata survives container rebuild.
metastoreDb.type=postgresql
metastoreDb.jdbcUrl=jdbc:postgresql://postgres-meta:5432/ucatalog
metastoreDb.jdbcUser=metauser
metastoreDb.jdbcPassword=metapass

# --- Object storage (data) ------------------------------------------
# MinIO S3-compatible — UC stores table data references; Spark/Trino do the I/O.
s3.bucketPath.0=s3://lakehouse
s3.accessKey.0=minioadmin
s3.secretKey.0=minioadmin
s3.region.0=us-east-1
s3.endpoint.0=http://minio:9000
s3.pathStyleAccess.0=true

# --- Auth (POC: disabled). Enable Keycloak/OIDC in production. -------
server.authorization=disable
