# =====================================================================
# Spark 4.0 defaults — Delta Lake + Hive Metastore + S3a (MinIO)
# =====================================================================

# Delta SQL extensions + DeltaCatalog wrap the Hive catalog so Delta
# tables registered in HMS behave correctly under spark_catalog.
spark.sql.extensions                       io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog            org.apache.spark.sql.delta.catalog.DeltaCatalog

# Hive Metastore (Thrift) — primary catalog
spark.sql.catalogImplementation            hive
spark.hadoop.hive.metastore.uris           thrift://hive-metastore:9083
spark.sql.warehouse.dir                    s3a://lakehouse/warehouse

# Delta defaults (deletion vectors, column mapping by name)
spark.databricks.delta.properties.defaults.enableChangeDataFeed   true
spark.databricks.delta.properties.defaults.columnMapping.mode     name
spark.databricks.delta.properties.defaults.minReaderVersion       3
spark.databricks.delta.properties.defaults.minWriterVersion       7

# S3a — MinIO endpoint
spark.hadoop.fs.s3a.endpoint                       http://minio:9000
spark.hadoop.fs.s3a.path.style.access              true
spark.hadoop.fs.s3a.connection.ssl.enabled         false
spark.hadoop.fs.s3a.aws.credentials.provider       org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.impl                           org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.committer.name                 directory
spark.hadoop.fs.s3a.fast.upload                    true

# Spark runtime tuning for laptop POC
spark.sql.shuffle.partitions                       8
spark.sql.adaptive.enabled                         true
spark.sql.adaptive.coalescePartitions.enabled      true
spark.sql.execution.arrow.pyspark.enabled          true

# Driver/executor — modest for laptop
spark.driver.memory                                1g
spark.executor.memory                              1500m

# Network — driver must bind on all interfaces in containers
spark.driver.bindAddress                           0.0.0.0

# Executor PYTHONPATH so UDFs can `from lib.X import Y`.
# Mirrors the volume mount in docker-compose x-spark-common.
spark.executorEnv.PYTHONPATH                       /opt/hybrid/pipeline/spark_jobs
spark.yarn.appMasterEnv.PYTHONPATH                 /opt/hybrid/pipeline/spark_jobs
spark.executorEnv.S3_ENDPOINT_URL                  http://minio:9000
spark.executorEnv.AWS_ACCESS_KEY_ID                minioadmin
spark.executorEnv.AWS_SECRET_ACCESS_KEY            minioadmin
