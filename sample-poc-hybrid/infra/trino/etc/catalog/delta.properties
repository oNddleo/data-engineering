connector.name=delta_lake

# Trino 470 Delta connector supports only HMS or Glue as metastore.
# UC OSS support is not available in OSS Trino 470 (Starburst-only / post-470).
hive.metastore=thrift
hive.metastore.uri=thrift://hive-metastore:9083

# S3a (MinIO) — match Spark/Hive settings
hive.s3.endpoint=http://minio:9000
hive.s3.path-style-access=true
hive.s3.ssl.enabled=false
hive.s3.aws-access-key=minioadmin
hive.s3.aws-secret-key=minioadmin

# Allow Trino → Delta writes for ad-hoc queries; safe in POC single-node.
delta.enable-non-concurrent-writes=true
