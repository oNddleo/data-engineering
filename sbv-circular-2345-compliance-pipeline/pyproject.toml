[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sbv-circular-2345-compliance-pipeline"
version = "0.1.0"
description = "Tamper-evident audit-trail ledger for transactions subject to SBV Decision 2345/QĐ-NHNN, with 5-year retention enforcement."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "sophie-nguyenthuthuy" }]
keywords = ["sbv", "decision-2345", "audit-trail", "hash-chain", "merkle", "fintech-vn"]
classifiers = ["Development Status :: 4 - Beta"]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "hypothesis>=6.100", "mypy>=1.10", "ruff>=0.5"]

[project.scripts]
sbv2345 = "sbv2345.cli:main"

[project.urls]
Homepage = "https://github.com/sophie-nguyenthuthuy/data-engineering/tree/main/sbv-circular-2345-compliance-pipeline"

[tool.hatch.build.targets.wheel]
packages = ["src/sbv2345"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "SIM", "RUF", "TC"]
ignore = ["E501", "B008", "RUF001", "RUF002", "RUF003"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B", "SIM", "TC"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
markers = ["slow: marks tests as slow", "property: hypothesis property tests"]
