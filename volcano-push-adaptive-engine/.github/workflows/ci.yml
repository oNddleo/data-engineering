name: volcano-push-adaptive-engine

on:
  push:
    paths:
      - "volcano-push-adaptive-engine/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "volcano-push-adaptive-engine/**"
      - ".github/workflows/ci.yml"

jobs:
  ci:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: volcano-push-adaptive-engine
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: volcano-push-adaptive-engine/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]" mypy ruff hypothesis

      - name: Lint (ruff check)
        run: python -m ruff check src/adaptive_engine/ tests/

      - name: Format (ruff format)
        run: python -m ruff format --check src/adaptive_engine/ tests/

      - name: Type check (mypy)
        run: python -m mypy --strict src/adaptive_engine/

      - name: Test
        run: python -m pytest tests/ -q
