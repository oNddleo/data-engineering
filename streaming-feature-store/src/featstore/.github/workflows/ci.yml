name: featstore CI

on:
  push:
    paths:
      - "streaming-feature-store/**"
  pull_request:
    paths:
      - "streaming-feature-store/**"

defaults:
  run:
    working-directory: streaming-feature-store

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e . ruff mypy hypothesis pytest

      - name: Ruff lint
        run: python -m ruff check src/featstore/ tests/

      - name: Ruff format check
        run: python -m ruff format --check src/featstore/ tests/

      - name: mypy --strict
        run: python -m mypy --strict --package featstore

      - name: pytest
        run: python -m pytest tests/ -v --tb=short
