[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "featstore"
version = "0.1.0"
description = "Streaming feature store — stdlib only"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
featstore = "featstore.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 99
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "TCH", "ANN"]
ignore = ["ANN101", "ANN102", "ANN401"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN", "S101", "TCH"]

[tool.mypy]
strict = true
packages = ["featstore"]

[tool.pytest.ini_options]
testpaths = ["tests"]
